name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # No dependencies to install - the project runs on the standard library.
      - name: Run test suite (offline, deterministic)
        run: python -m unittest discover -s tests -v
